name: Toolset drift canary

# Plan #44 Task #23 — weekly canary that snapshots each agent's tools[]
# payload and diffs it against the most recent prior snapshot under
# agents/toolset-snapshots/. Catches drift WITHIN the
# agent_toolset_20260401 dated contract — Anthropic may extend tool
# descriptions / argument shapes without changing the toolset ID, and
# we want to know before a session starts behaving differently in
# production. Breaking changes ship as a new dated toolset ID; this
# canary catches that too (the diff prints a "tools[] changed" line).
#
# Required secrets:
#   ANTHROPIC_API_KEY — sk-ant-* key with Managed Agents read scope.
#   The agent-ID secrets are threaded the same way the verify
#   workflow does it (defense-in-depth: an env-resolved agent ID
#   would otherwise be silently skipped).
#
# Optional:
#   SLACK_BOT_TOKEN + SLACK_ADMIN_USER_IDS — used by the post-job
#   admin-DM step. Without them the workflow still fails on drift,
#   it just doesn't send a Slack DM.

on:
  schedule:
    # Mondays 13:00 UTC = 06:00 PT, before the daily 08:00 cost digest.
    - cron: '0 13 * * 1'
  workflow_dispatch:

permissions:
  contents: write   # commit the new snapshot back to main
  pull-requests: write

concurrency:
  group: toolset-drift-canary
  cancel-in-progress: false

jobs:
  canary:
    name: toolset-drift-canary
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      COORDINATOR_ID: ${{ secrets.COORDINATOR_ID }}
      QUICK_ANSWER_ID: ${{ secrets.QUICK_ANSWER_ID }}
      DREAM_AGENT_ID: ${{ secrets.DREAM_AGENT_ID }}
      PIPELINE_MONITOR_ID: ${{ secrets.PIPELINE_MONITOR_ID }}
      SALES_MONITOR_ID: ${{ secrets.SALES_MONITOR_ID }}
      POSTSALES_MONITOR_ID: ${{ secrets.POSTSALES_MONITOR_ID }}
      STATISTICIAN_ID: ${{ secrets.STATISTICIAN_ID }}
      CHART_DESIGNER_ID: ${{ secrets.CHART_DESIGNER_ID }}
      ADVERSARIAL_REVIEWER_ID: ${{ secrets.ADVERSARIAL_REVIEWER_ID }}
      CROSS_DOMAIN_SYNTHESIZER_ID: ${{ secrets.CROSS_DOMAIN_SYNTHESIZER_ID }}
      WRITING_AGENT_ID: ${{ secrets.WRITING_AGENT_ID }}
      PROMPT_ENGINEER_ID: ${{ secrets.PROMPT_ENGINEER_ID }}
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_ADMIN_USER_IDS: ${{ secrets.SLACK_ADMIN_USER_IDS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install anthropic requests

      - name: Verify required secret
        run: |
          if [ -z "${ANTHROPIC_API_KEY:-}" ]; then
            echo "::error::Missing required GitHub secret: ANTHROPIC_API_KEY"
            exit 1
          fi

      - name: Synthesize minimal .env
        run: |
          echo "ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}" > .env

      - name: Run drift canary
        id: canary
        # The script exits 1 on drift; continue-on-error so we get to
        # the Slack DM step and the snapshot commit even when drift is
        # detected. The job's outcome reflects the canary's exit code
        # via the explicit "Fail on drift" step at the bottom.
        continue-on-error: true
        run: python bin/audit-toolset-drift.py

      - name: Commit new snapshot
        if: success() || failure()
        run: |
          set -euo pipefail
          rm -f .env
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet agents/toolset-snapshots/; then
            echo "No new snapshot to commit."
            exit 0
          fi
          git add agents/toolset-snapshots/
          git commit -m "chore(canary): refresh agents/toolset-snapshots/ (weekly drift canary)"
          git push origin HEAD:main || echo "push blocked — snapshot left in working tree"

      - name: DM admins on drift
        if: steps.canary.outcome == 'failure' && env.SLACK_BOT_TOKEN != '' && env.SLACK_ADMIN_USER_IDS != ''
        env:
          DRIFT_RC: ${{ steps.canary.outcome }}
        run: |
          python <<'PY'
          import os
          import requests
          token = os.environ["SLACK_BOT_TOKEN"]
          admins = [u.strip() for u in os.environ.get("SLACK_ADMIN_USER_IDS", "").split(",") if u.strip()]
          if not admins:
              print("No admins configured — skipping DM.")
              raise SystemExit(0)
          text = (
              ":satellite: *Toolset drift detected*. The weekly drift canary "
              "found a change in at least one agent's tools[] payload "
              "without a corresponding agent update on our side. See the "
              "workflow run for the diff and "
              "docs/runbooks/managed-agents-conformance.md for the operator "
              "workflow."
          )
          for uid in admins:
              # Open a DM channel, then post the message there.
              r = requests.post(
                  "https://slack.com/api/conversations.open",
                  json={"users": uid},
                  headers={"Authorization": f"Bearer {token}"},
                  timeout=10,
              )
              data = r.json()
              if not data.get("ok"):
                  print(f"[FAIL] open DM with {uid}: {data}")
                  continue
              channel = data["channel"]["id"]
              r = requests.post(
                  "https://slack.com/api/chat.postMessage",
                  json={"channel": channel, "text": text},
                  headers={"Authorization": f"Bearer {token}"},
                  timeout=10,
              )
              print(f"[DM] {uid}: ok={r.json().get('ok')}")
          PY

      - name: Fail job on drift
        if: steps.canary.outcome == 'failure'
        run: exit 1
