name: Bot Comment Watcher

# Recurring agent that processes unresolved bot comments (Codex, CodeRabbit,
# Copilot, dependabot) on open PRs. Fixes are applied by an LLM in an
# isolated worktree, committed back to the PR branch, and the bot comment is
# replied to and resolved. After 2 quiet loops on a PR (no net-new bot
# comments), the watcher merges that PR.
#
# Kill switch: create a file `.github/bot-watcher-paused` in the repo. The
# job exits early and processes nothing.
#
# Required secrets:
#   ANTHROPIC_API_KEY  - sk-ant-* key for LLM-driven fixes
#
# Required permissions: contents:write (push commits), pull-requests:write
# (merge, comment, resolve), issues:write (comment).

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: false
        default: 'normal'
        type: choice
        options:
          - normal
          - first-run
          - dry-run

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: bot-comment-watcher
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 14
    steps:
      - name: Check for kill switch
        id: kill_switch
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          if curl -fsS -H "Authorization: Bearer $GITHUB_TOKEN" \
              "https://api.github.com/repos/${REPO}/contents/.github/bot-watcher-paused" \
              > /dev/null 2>&1; then
            echo "Kill switch active (.github/bot-watcher-paused exists). Exiting."
            echo "paused=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "paused=false" >> "$GITHUB_OUTPUT"

      - name: Checkout main
        if: steps.kill_switch.outputs.paused != 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        if: steps.kill_switch.outputs.paused != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        if: steps.kill_switch.outputs.paused != 'true'
        run: |
          python -m pip install --upgrade pip
          pip install 'anthropic>=0.92.0' 'requests>=2.31.0' 'compresr>=2.5.0'

      - name: Configure git
        if: steps.kill_switch.outputs.paused != 'true'
        run: |
          git config user.name "bot-comment-watcher[bot]"
          git config user.email "bot-comment-watcher@users.noreply.github.com"

      - name: Restore state from orphan branch
        if: steps.kill_switch.outputs.paused != 'true'
        run: |
          mkdir -p .bot-watcher-state
          if git ls-remote --exit-code origin bot-watcher-state >/dev/null 2>&1; then
            git fetch origin bot-watcher-state
            git show origin/bot-watcher-state:state.json > .bot-watcher-state/state.json 2>/dev/null \
              || echo '{}' > .bot-watcher-state/state.json
          else
            echo '{}' > .bot-watcher-state/state.json
            echo "No prior state; first run."
          fi

      - name: Run watcher
        if: steps.kill_switch.outputs.paused != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          WATCHER_MODE: ${{ inputs.mode || 'normal' }}
          STATE_FILE: ${{ github.workspace }}/.bot-watcher-state/state.json
          COMPRESR_API_KEY: ${{ secrets.COMPRESR_API_KEY }}
          COMPRESS_BOT_COMMENT_WATCHER_ENABLED: ${{ vars.COMPRESS_BOT_COMMENT_WATCHER_ENABLED || 'false' }}
        run: |
          python scripts/bot_comment_watcher.py

      - name: Persist state to orphan branch
        if: steps.kill_switch.outputs.paused != 'true' && always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ! -f .bot-watcher-state/state.json ]; then
            echo "No state file to persist."
            exit 0
          fi
          STATE_BRANCH=bot-watcher-state
          STATE_DIR=$(mktemp -d)
          # actions/checkout sets http.extraheader on the primary repo to
          # authenticate pushes. A fresh `git init` tempdir doesn't inherit
          # that, so we instead use a tokenized remote URL for pushes.
          AUTH_URL="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          if git ls-remote --exit-code origin "$STATE_BRANCH" >/dev/null 2>&1; then
            # Existing branch: check out into a worktree and update.
            git worktree add "$STATE_DIR" "origin/$STATE_BRANCH" --detach
          else
            # First-ever run: initialize a fresh empty repo in the tempdir
            # and push as a brand-new branch.
            git init "$STATE_DIR" >/dev/null
            (
              cd "$STATE_DIR"
              git config user.name "bot-comment-watcher[bot]"
              git config user.email "bot-comment-watcher@users.noreply.github.com"
              git remote add origin "$AUTH_URL"
              git checkout -b "$STATE_BRANCH"
            )
          fi
          cp .bot-watcher-state/state.json "$STATE_DIR/state.json"
          cd "$STATE_DIR"
          git add state.json
          if git diff --cached --quiet; then
            echo "State unchanged."
          else
            git commit -m "watcher: update state ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
            # Always push with the tokenized URL so the fresh-init path
            # works on first run, and the worktree path still has creds.
            git push "$AUTH_URL" "HEAD:$STATE_BRANCH"
          fi
